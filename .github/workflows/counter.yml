name: Update Counter

on:
  push:
    branches: [main]
    paths-ignore:
      - 'counter.json'
      - 'counter.txt'
      - 'counter.png'
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      count:
        description: 'Set count (leave empty to increment)'
        required: false
        type: string
  repository_dispatch:
    types: [page_view]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read count
        id: read
        run: |
          n=0
          if [ -f counter.json ]; then
            n=$(grep -o '"count": *[0-9]*' counter.json | grep -o '[0-9]*' || echo 0)
          fi
          echo "count=${n:-0}" >> $GITHUB_OUTPUT

      - name: Update count
        id: set
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            n=${{ steps.read.outputs.count }}
          elif [ -n "${{ github.event.inputs.count }}" ]; then
            n=${{ github.event.inputs.count }}
          else
            c=${{ steps.read.outputs.count }}
            n=$((${c:-0} + 1))
          fi
          echo "count=$n" >> $GITHUB_OUTPUT
          echo "$n" > counter.txt
          echo "{\"count\": $n}" > counter.json

      - name: Generate badge
        run: |
          sudo apt-get update -qq && sudo apt-get install -y imagemagick
          n=${{ steps.set.outputs.count }}
          files=$(printf "%07d" $n | sed 's/\(.\)/theme\/\1.png /g')
          convert $files -resize 80x80 +append counter.png

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add counter.json counter.txt counter.png
          git diff --staged --quiet || git commit -m "views: ${{ steps.set.outputs.count }}"
          git push
