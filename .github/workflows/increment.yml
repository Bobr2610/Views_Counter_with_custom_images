name: View Counter

on:
  push:
    branches: [main]
    paths-ignore:
      - 'counter.json'
      - 'counter.txt'
      - 'counter.png'
  repository_dispatch:
    types: [page_view]
  workflow_dispatch:
    inputs:
      count:
        description: 'Set specific count (optional, leave empty to increment)'
        required: false
        type: string

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read current count
        id: read
        run: |
          count=0
          if [ -f counter.json ]; then
            count=$(grep -o '"count": *[0-9]*' counter.json | grep -o '[0-9]*' || echo 0)
          fi
          if [ -z "$count" ] && [ -f counter.txt ]; then
            count=$(cat counter.txt)
          fi
          count=${count:-0}
          echo "count=$count" >> $GITHUB_OUTPUT

      - name: Increment or set count
        id: set
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            new_count=${{ steps.read.outputs.count }}
          elif [ -n "${{ github.event.inputs.count }}" ]; then
            new_count=${{ github.event.inputs.count }}
          else
            current=${{ steps.read.outputs.count }}
            new_count=$((${current:-0} + 1))
          fi
          echo "new_count=$new_count" >> $GITHUB_OUTPUT
          echo "$new_count" > counter.txt
          echo "{\"count\": $new_count}" > counter.json
          echo "Count: $new_count"

      - name: Generate beaver counter image
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
          count=${{ steps.set.outputs.new_count }}
          digits=$(printf "%07d" $count)
          files=$(echo $digits | sed 's/\(.\)/theme\/\1.png /g')
          convert $files -resize 80x80 +append counter.png

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add counter.json counter.txt counter.png
          git diff --staged --quiet || git commit -m "views: ${{ steps.set.outputs.new_count }}"
          git push
