name: Update Visitor Counter

on:
  push:
    branches: [main, master]
    paths-ignore:
      - counter.png
      - theme/
      - README.md
  schedule:
    - cron: '0 * * * *'  # Запуск каждый час
  workflow_dispatch:     # Позволяет запустить вручную

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get count
        id: count
        env:
          TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
        run: |
          # Try Traffic API first
          if [ -n "$TOKEN" ]; then
            RESPONSE=$(curl -sS -H "Authorization: token $TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/traffic/views" || echo '{}')
            # Use API count only when response has valid "count" field (including 0)
            # Fallback to counter.json only when API fails (no count in response)
            if echo "$RESPONSE" | jq -e 'has("count")' > /dev/null 2>&1; then
              VIEWS=$(echo "$RESPONSE" | jq -r '.count')
            else
              VIEWS=$(jq -r '.count // 0' counter.json 2>/dev/null || echo "0")
            fi
          else
            VIEWS=$(jq -r '.count // 0' counter.json 2>/dev/null || echo "0")
          fi
          echo "views=$VIEWS" >> $GITHUB_OUTPUT

      - name: Generate counter from beaver theme
        run: |
          sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends imagemagick
          n=${{ steps.count.outputs.views }}
          digits=$(printf "%d" $n)
          files=$(echo $digits | sed 's/\(.\)/theme\/\1.png /g')
          convert $files -resize 80x80 +append counter.png

      - name: Update README badge (auto-detect repo and cache-bust)
        id: cachebust
        env:
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          TS=$(date +%s)
          echo "ts=$TS" >> $GITHUB_OUTPUT
          export TS REPO BRANCH
          python3 << 'PYEOF'
          import re, os
          repo = os.environ['REPO']
          branch = os.environ['BRANCH']
          ts = os.environ.get('TS', '0')
          new_url = f'https://raw.githubusercontent.com/{repo}/{branch}/counter.png?v={ts}'
          badge = f'[![Views]({new_url})](https://github.com/{repo})'
          with open('README.md') as f:
            content = f.read()
          # Match badge: [![Views](URL)](link) - any raw URL with counter.png
          pattern = r'\[!\[Views\]\(https://raw\.githubusercontent\.com/[^)]+counter\.png[^)]*\)\]\(https://github\.com/[^)]+\)'
          new_content = re.sub(pattern, badge, content)
          # Fallback: replace only the counter.png URL part (repo+branch+v) for cache bust
          if new_content == content:
            new_content = re.sub(
              r'https://raw\.githubusercontent\.com/[^/]+/[^/]+/[^/]+/counter\.png(\?v=[0-9]+)?',
              new_url,
              content
            )
          content = new_content
          with open('README.md', 'w') as f:
            f.write(content)
          print(f"Badge URL updated: ?v={ts}")
          PYEOF

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add counter.png README.md
          git diff --staged --quiet || git commit -m "Update visitor count: ${{ steps.count.outputs.views }}"
          git push
