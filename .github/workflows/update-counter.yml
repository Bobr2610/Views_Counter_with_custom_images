name: Update Visitor Counter

on:
  push:
    branches: [main]
    paths-ignore:
      - counter.png
  schedule:
    - cron: '0 * * * *'  # Запуск каждый час
  workflow_dispatch:     # Позволяет запустить вручную

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get Traffic Data
        id: traffic
        env:
          TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
        run: |
          RESPONSE=$(curl -sS -H "Authorization: token $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/traffic/views")
          VIEWS=$(echo "$RESPONSE" | jq -r '.count // 0')
          echo "views=$VIEWS" >> $GITHUB_OUTPUT

      - name: Update SVG
        run: |
          VIEWS=${{ steps.traffic.outputs.views }}
          sed -i "s/{{COUNT}}/$VIEWS/g" counter.svg

      - name: Convert SVG to PNG
        run: |
          sudo apt-get update -qq && sudo apt-get install -y imagemagick
          convert -density 192 -background none counter.svg counter.png

      - name: Commit and Push
        run: |
          git checkout counter.svg
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add counter.png
          git diff --staged --quiet || git commit -m "Update visitor count: ${{ steps.traffic.outputs.views }}"
          git push
