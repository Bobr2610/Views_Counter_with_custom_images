name: Update Visitor Counter

on:
  push:
    branches: [main]
    paths-ignore:
      - counter.png
      - theme/
  schedule:
    - cron: '0 * * * *'  # Запуск каждый час
  workflow_dispatch:     # Позволяет запустить вручную

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get Traffic Data
        id: traffic
        env:
          TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
        run: |
          RESPONSE=$(curl -sS -H "Authorization: token $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/traffic/views")
          VIEWS=$(echo "$RESPONSE" | jq -r '.count // 0')
          echo "views=$VIEWS" >> $GITHUB_OUTPUT

      - name: Generate counter from beaver theme
        run: |
          sudo apt-get update -qq && sudo apt-get install -y imagemagick
          n=${{ steps.traffic.outputs.views }}
          digits=$(printf "%07d" $n)
          files=$(echo $digits | sed 's/\(.\)/theme\/\1.png /g')
          convert $files -resize 80x80 +append counter.png

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add counter.png
          git diff --staged --quiet || git commit -m "Update visitor count: ${{ steps.traffic.outputs.views }}"
          git push
