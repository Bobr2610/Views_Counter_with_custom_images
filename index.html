<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beaver Counter</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }
    #counter {
      display: flex;
      gap: 2px;
    }
    #counter img {
      width: 80px;
      height: 80px;
      object-fit: contain;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <div id="counter"></div>
  <script>
    async function loadCounter() {
      try {
        const response = await fetch('counter.json');
        const data = await response.json();
        const count = data.count || 0;
        const digits = count.toString().padStart(6, '0');
        const container = document.getElementById('counter');
        
        for (const digit of digits) {
          const img = document.createElement('img');
          img.src = `theme/${digit}.png`;
          img.alt = digit;
          container.appendChild(img);
        }
      } catch (e) {
        console.error('Failed to load counter:', e);
      }
    }
    loadCounter();
  </script>
</body>
</html>
